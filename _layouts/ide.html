<!doctype html>
<html lang="en">

{% assign wants_math = page.use_math | default: false %}
{% assign wants_code = page.use_code | default: false %}

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ site.title }} - {{ page.title }}</title>
    <script>
        (function () {
            const m = localStorage.getItem("theme-mode"); // "light" | "dark" | "auto"
            const r = document.documentElement;
            if (m === "light" || m === "dark") r.setAttribute("data-theme", m);
            else if (m === "auto") r.removeAttribute("data-theme");
            else r.removeAttribute("data-theme");                   // default: auto
        })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/ide.css' | relative_url }}">
    {% if wants_code %}
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css'
        id="hljs-dark">
    <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css'
        id="hljs-light" disabled>
    <script>
        (function () {
            const modeAttr = document.documentElement.getAttribute("data-theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const resolved = modeAttr ? modeAttr : (prefersDark ? "dark" : "light");
            const darkSheet = document.getElementById("hljs-dark");
            const lightSheet = document.getElementById("hljs-light");
            if (!darkSheet || !lightSheet) return;
            const useDark = resolved === "dark";
            darkSheet.disabled = !useDark;
            lightSheet.disabled = useDark;
        })();
    </script>
    {% endif %}
    {% if wants_math %}
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% endif %}
    {% if wants_code %}
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    {% endif %}
    <script defer src="{{ '/assets/js/ide.js' | relative_url }}"></script>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div>
                <div class="brand">{{ site.title }}. </div>
                <div id='random-phrase' style="font-size: 0.9em;"></div>
            </div>
            <script>
                const phrases = [
                    "<a class='topbar-href' href='https://www.youtube.com/watch?v=Qz-Rfh_FXws'>Molto libero. Poco professionista.</a>",
                    "<a class='topbar-href' href='https://dailystoic.com/imagine-happening-someone-else'>As if the world would notice.</a>",
                    "<a class='topbar-href' href='https://justfuckingusehtml.com'>HTML rocks.</a>",
                    "<a class='topbar-href' href='https://grugbrain.dev'>Say no to complexity.</a>",
                    "<a class='topbar-href' href='https://en.wikipedia.org/wiki/Falsifiability'>No grand narrative before empirical inconvenience.</a>",
                    "<a class='topbar-href' href='https://www.youtube.com/watch?v=kAqIJZeeXEc&pp'>Has what plants crave.</a>",
                ];
                const el = document.getElementById("random-phrase");
                el.innerHTML = phrases[Math.floor(Math.random() * phrases.length)];
            </script>
            <div class="topbar-actions">
                <a class="topbar-href" href="/">Home</a>
                <a class="topbar-href" href="/about">About</a>
                <a class="topbar-href" href="/feed.xml">rss</a>
                <button id="theme-toggle" type="button">☀️</button>
            </div>
        </header>

        <main class="content">
            {{ content }}
        </main>

        <footer class="footer">
            <a class="topbar-href github" href="https://github.com/markort147" aria-label="GitHub"></a>
            <a class="topbar-href twitter" href="https://x.com/markort147"></a>
            <a class="topbar-href instagram" href="https://www.instagram.com/rosmarchino"></a>
            <a class="topbar-href linkedin" href="https://www.linkedin.com/in/mr93/"></a>
        </footer>
    </div>
</body>

</html>
